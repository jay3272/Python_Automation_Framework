name: Test Suite

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Run Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auto-test-platform

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: auto-test-platform/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest (unit + integration + e2e)
        run: |
          pytest tests/ \
            --tb=short \
            -v \
            --cov=core \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-py${{ matrix.python-version }}
          path: auto-test-platform/reports/coverage.xml

      - name: Run platform runner (smoke test)
        run: |
          python main.py --tests-dir tests --report-dir reports
          exit_code=$?
          # Exit 0 = all passed; exit 1 = some tests failed (acceptable for smoke).
          # Any other code indicates a runner crash and should fail the job.
          if [ $exit_code -ne 0 ] && [ $exit_code -ne 1 ]; then
            echo "Unexpected exit code $exit_code — runner crashed"
            exit $exit_code
          fi

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: html-report-py${{ matrix.python-version }}
          path: auto-test-platform/reports/
